<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Off the Books Project — Coming Soon</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #11141c;
      --gold: #d4af37;
      --text: #e8e6df;
      --muted: #8b8f9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(212,175,55,0.10), transparent 60%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 560px;
      width: 100%;
    }
    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 32px;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.5));
    }
    .eyebrow {
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }
    .rule {
      width: 56px;
      height: 2px;
      background: var(--gold);
      margin: 28px auto;
      opacity: 0.8;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="verve-logo.png" alt="Verve" />
    <div class="eyebrow">Off the Books Project</div>
    <h1>Something is being put together.</h1>
    <div class="rule"></div>
    <p>This page is under construction. The full experience is on its way — check back soon.</p>
    <div class="footer">Verve &middot; Annual Day</div>
  </main>
</body>
</html>
