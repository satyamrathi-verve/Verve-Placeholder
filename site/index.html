<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Off the Books Project — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Permanent light theme. */
    :root {
      --verve: #2f6bff;
      --gold: #e0a436;
      --gold-deep: #b97f18;
      --ink: #0e1a33;
      --muted: #5b6b85;
      --faint: #8a97ad;
      --line: #e4eaf5;
      color-scheme: light;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1100px 720px at 50% -18%, rgba(47, 107, 255, 0.07), transparent 60%),
        radial-gradient(900px 680px at 50% 118%, rgba(224, 164, 54, 0.06), transparent 55%),
        #ffffff;
      background-attachment: fixed;
      color: var(--ink);
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 600px;
      width: 100%;
    }
    .eyebrow {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 0.95rem;
      color: var(--gold-deep);
      margin-bottom: 18px;
    }
    h1 {
      font-family: "Sora", ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(30px, 6vw, 48px);
      font-weight: 700;
      line-height: 1.12;
      color: var(--ink);
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }
    .rule {
      width: 56px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--verve), var(--gold));
      margin: 28px auto;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Off the Books Project</div>
    <h1>Something is being put together.</h1>
    <div class="rule"></div>
    <p>This page is under construction. The full experience is on its way — check back soon.</p>
  </main>
</body>
</html>
